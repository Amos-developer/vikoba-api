services:
  api:
    build: .
    container_name: vikoba-api

    ports:
      - "3002:3000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: vikoba-postgres

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: